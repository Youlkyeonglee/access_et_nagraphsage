# TSEM-SAGE §실험현황 "20260712 추가 실험계획" ①+②+③ 삼중 조합 — invariant_rot(8D) +
# 학습형 잔차(4D) + hidden_dim=192. ②(학습형 잔차)가 단독 실험에서 성능 개선을 보일 경우,
# ①(회전량 채널)·③(용량 확대)과 누적 효과를 내는지 확인하는 최대 조합.
# 입력은 8D(①) + 4D(②) = 12D, hidden_dim/d_e는 ③과 동일(192/48).
# 실행: python train_tsem.py --config configs/tsem_sage_invariant_8d_rot_learnable_h192.yaml --gpus <N>

data:
  dataset: gongeoptap
  data_dir: /home/oem/data/TII_data/
  train_ratio: 0.70
  val_ratio:   0.15

tsem:
  W: 10
  H: 10

graph:
  radius: 20.0
  K_max:  6
  K_max2: 4

model:
  name: tsem_sage
  semantic_variant: invariant_rot   # ① 8D
  raw_append: none
  learnable_residual_dim: 4         # ② 학습형 잔차 4D
  hidden_dim: 192                   # ③ 용량 확대
  d_e: 48
  encoder_type: gru
  use_attention: true
  use_2hop: true
  use_spatial: true
  num_classes: 3
  dropout: 0.3
  decomp_kernel: 5
  decomp_learnable: true

train:
  batch_size: 4096
  num_epochs: 300
  lr: 0.001
  weight_decay: 1.0e-5
  scheduler: onecycle
  num_workers: 4
  early_stop_patience: 50

loss:
  type: focal
  gamma: 2.0
  use_class_weights: true
  class_weight_power: 0.7
  lambda_temporal: 0.3
  lambda_spatial: 0.3
  kl_weight: 0.1
  use_uncertainty_weight: true

augment:
  noise_std: 1.0
  neighbor_dropout_p: 0.1
  frame_dropout_p: 0.1
  rotate_deg: 0.0

seed: 42
save_dir: ./checkpoints/tsem/
experiment: tsem_sage_invariant_8d_rot_learnable_h192
