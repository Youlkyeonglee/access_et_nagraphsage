# ET-NAGraphSAGE 2-hop — 300 Epoch (GPU 0)
# 2hop_attn_reg_T10 최고 설정 그대로, epochs만 150→300으로 연장
# val 곡선이 150 epoch에서 아직 수렴 안 됐으므로 추가 수렴 여지 확인

data:
  dataset: gongeoptap
  data_dir: /home/oem/data/TII_data/
  train_ratio: 0.70
  val_ratio:   0.15

graph:
  T:      10
  radius: 20.0
  K_max:  6
  K_max2: 4

model:
  node_dim:      6
  edge_dim:      5
  hidden_dim:    128
  d_e:           32
  encoder_type:  gru
  use_attention: true
  use_2hop:      true
  num_classes:   3
  dropout:       0.5

train:
  batch_size:   4096
  num_epochs:   300
  lr:           0.001
  weight_decay: 1.0e-4
  scheduler:    cosine
  patience:     50
  num_workers:  8
  use_amp:      true

loss:
  type:              ce
  kl_weight:         0.0
  label_smoothing:   0.1
  use_class_weights: false

seed:       42
save_dir:   /home/oem/TNA_research/checkpoints/
log_dir:    /home/oem/TNA_research/logs/
experiment: et_nagraphsage_2hop_ep300
