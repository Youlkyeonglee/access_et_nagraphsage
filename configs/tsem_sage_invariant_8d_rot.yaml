# TSEM-SAGE §실험현황 "20260712 추가 실험계획" ① — 상대 heading 회전량 추가 (invariant_rot)
# 6D invariant(v,a,j,ω,d_lat,κ)에 cos(heading_t-heading_0), sin(heading_t-heading_0) 2채널을
# 추가한 8D. 절대 heading(dir_x,dir_z)은 site-calibration에 묶여 못 쓰지만, 윈도우 시작 시점
# 대비 상대 회전량은 d_lat과 동일한 원칙으로 invariant를 유지하면서 "누적 회전" 정보를 준다.
# 6D invariant(76.21%/74.78%, tsem_sage_invariant_6d)와 라벨/loss/augmentation/학습 프로토콜
# 전부 동일, model.semantic_variant='invariant_rot'만 다름.
# 실행: python train_tsem.py --config configs/tsem_sage_invariant_8d_rot.yaml --gpus <N>

data:
  dataset: gongeoptap
  data_dir: /home/oem/data/TII_data/
  train_ratio: 0.70
  val_ratio:   0.15

tsem:
  W: 10
  H: 10

graph:
  radius: 20.0
  K_max:  6
  K_max2: 4

model:
  name: tsem_sage
  semantic_variant: invariant_rot   # ★ 유일한 변경점 — v,a,j,ω,d_lat,κ + cos/sin(Δheading) = 8D
  raw_append: none
  hidden_dim: 128
  d_e: 32
  encoder_type: gru
  use_attention: true
  use_2hop: true
  use_spatial: true
  num_classes: 3
  dropout: 0.3
  decomp_kernel: 5
  decomp_learnable: true

train:
  batch_size: 4096
  num_epochs: 300   # comparison/ 5개 baseline·6D invariant와 동일 프로토콜
  lr: 0.001
  weight_decay: 1.0e-5
  scheduler: onecycle
  num_workers: 4
  early_stop_patience: 50

loss:
  type: focal
  gamma: 2.0
  use_class_weights: true
  class_weight_power: 0.7
  lambda_temporal: 0.3
  lambda_spatial: 0.3
  kl_weight: 0.1
  use_uncertainty_weight: true

augment:
  noise_std: 1.0
  neighbor_dropout_p: 0.1
  frame_dropout_p: 0.1
  rotate_deg: 0.0

seed: 42
save_dir: ./checkpoints/tsem/
experiment: tsem_sage_invariant_8d_rot
