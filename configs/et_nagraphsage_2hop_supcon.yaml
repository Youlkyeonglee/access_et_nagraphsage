# ET-NAGraphSAGE 2-hop + SupCon (GPU 2)
# 2-hop 공간 구조 + SupCon 임베딩 분리를 결합
# 각각 단독으로 효과 확인 → 결합 시 additive 효과 검증

data:
  dataset: gongeoptap
  data_dir: /home/oem/data/TII_data/
  train_ratio: 0.70
  val_ratio:   0.15

graph:
  T:      10
  radius: 20.0
  K_max:  6
  K_max2: 4

model:
  node_dim:      6
  edge_dim:      5
  hidden_dim:    128
  d_e:           32
  encoder_type:  gru
  use_attention: true
  use_2hop:      true
  num_classes:   3
  dropout:       0.5
  proj_dim:      64

train:
  batch_size:   4096
  num_epochs:   150
  lr:           0.001
  weight_decay: 1.0e-4
  scheduler:    cosine
  patience:     30
  num_workers:  8
  use_amp:      true

loss:
  type:              ce
  kl_weight:         0.0
  label_smoothing:   0.1
  use_class_weights: false
  supcon_weight:     0.1
  supcon_temp:       0.07

seed:       42
save_dir:   /home/oem/TNA_research/checkpoints/
log_dir:    /home/oem/TNA_research/logs/
experiment: et_nagraphsage_2hop_supcon
