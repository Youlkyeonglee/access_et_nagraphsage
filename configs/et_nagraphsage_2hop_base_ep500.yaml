# ET-NAGraphSAGE 2-hop Base (Ablation C/E 공용, 500 epoch)
# SupCon 없는 순수 2-hop 기준. temporal_target / neighbor_mode를 CLI로 바꿔가며 ablation.
# 기준 결과: 2-hop CE+LS 94.15% (150ep) → 500ep로 예산 일치.

data:
  dataset: gongeoptap
  data_dir: /home/oem/yklee/data/
  train_ratio: 0.70
  val_ratio:   0.15

graph:
  T:      10
  radius: 20.0
  K_max:  6
  K_max2: 4
  neighbor_mode: hybrid   # hybrid | count | radius (Ablation E, CLI로 변경)

model:
  node_dim:      6
  edge_dim:      5
  hidden_dim:    128
  d_e:           32
  encoder_type:  gru
  use_attention: true
  use_2hop:      true
  num_classes:   3
  dropout:       0.5
  temporal_target: both   # both | node | edge (Ablation C, CLI로 변경)

train:
  batch_size:   4096
  num_epochs:   500
  lr:           0.001
  weight_decay: 1.0e-4
  scheduler:    cosine
  patience:     150
  num_workers:  8
  use_amp:      true

loss:
  type:              ce
  kl_weight:         0.0
  label_smoothing:   0.1
  use_class_weights: false

seed:       42
save_dir:   ./checkpoints/
log_dir:    ./logs/
experiment: et_nagraphsage_2hop_base_ep500
