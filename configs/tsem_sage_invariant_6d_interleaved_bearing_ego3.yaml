# TSEM-SAGE §exp-20260713-plan ① 메시지 패싱 라운드 확장 — 단독 검증 (2026-07-13)
# tsem_sage_invariant_6d_interleaved_bearing.yaml(②interleaved+③bearing, 실행중/실행완료)을
# baseline으로, ego 쪽 1-hop 집계만 num_ego_rounds=3으로 반복 정제 — layer_1hop_extra(잔차,
# 독립 가중치 2개 추가)가 h_nbr_t는 고정한 채 h_ego만 재참조해 다듬는다. 근거: docs/
# TSEM_journal_design.html §exp-20260713-plan "① 메시지 패싱이 딱 1라운드뿐" 문제 제기.
# 구현: models/tsem_sage.py::TSEMSAGEInterleaved(num_ego_rounds), 기본값 1(기존과 100% 동일).
# baseline과 나머지 전부 동일, model.num_ego_rounds(1→3)만 다름.
# 실행: python train_tsem.py --config configs/tsem_sage_invariant_6d_interleaved_bearing_ego3.yaml --gpus 0

data:
  dataset: gongeoptap
  data_dir: /home/oem/data/TII_data/
  train_ratio: 0.70
  val_ratio:   0.15

tsem:
  W: 10
  H: 10

graph:
  radius: 20.0
  K_max:  6
  K_max2: 4
  edge_feat_variant: bearing   # baseline과 동일 — 7D

model:
  name: tsem_sage_interleaved
  semantic_variant: invariant
  raw_append: none
  edge_dim: 7
  hidden_dim: 128
  d_e: 32
  use_2hop: true
  num_classes: 3
  dropout: 0.3
  num_ego_rounds: 3   # ★ 이 config의 핵심 변경점 — 기본 1

train:
  batch_size: 4096
  num_epochs: 300
  lr: 0.001
  weight_decay: 1.0e-5
  scheduler: onecycle
  num_workers: 4
  early_stop_patience: 50

loss:
  type: focal
  gamma: 2.0
  use_class_weights: true
  class_weight_power: 0.7
  lambda_temporal: 0.0
  lambda_spatial: 0.0
  kl_weight: 0.1
  use_uncertainty_weight: true

augment:
  noise_std: 1.0
  neighbor_dropout_p: 0.1
  frame_dropout_p: 0.1
  rotate_deg: 0.0

seed: 42
save_dir: ./checkpoints/tsem/
experiment: tsem_sage_invariant_6d_interleaved_bearing_ego3
