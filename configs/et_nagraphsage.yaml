# ET-NAGraphSAGE 기본 설정
# 비교 기준: NAGraphSAGE (hidden=128, layers=5, World 좌표, EdgeDim3 avg 94.07%)

# ── 데이터 ──────────────────────────────────────────────────────────────────
data:
  dataset: gongeoptap                          # gongeoptap | drift | both
  data_dir: /home/oem/data/TII_data/
  train_ratio: 0.70
  val_ratio:   0.15
  # test = 나머지 0.15

# ── 시계열 / 그래프 구조 ─────────────────────────────────────────────────────
graph:
  T:      10     # 시퀀스 길이 (Ablation B: 1/5/10/15)
  radius: 20.0   # 이웃 탐색 반경 m
  K_max:  6      # 1-hop 최대 이웃 수
  K_max2: 4      # 2-hop 최대 이웃 수 (0이면 비활성화)

# ── 모델 ─────────────────────────────────────────────────────────────────────
model:
  node_dim:     6
  edge_dim:     5
  hidden_dim:    128
  d_e:           32      # 엣지 인코더 출력 차원
  encoder_type:  gru     # gru | lstm | mamba (Ablation A)
  use_attention: true    # temporal attention 활성화
  use_2hop:      true    # 2-hop 공간 집계 활성화
  num_classes:   3
  dropout:       0.3

# ── 학습 ─────────────────────────────────────────────────────────────────────
train:
  batch_size:   16384
  num_epochs:   200
  lr:           0.001
  weight_decay: 1.0e-5
  scheduler:    onecycle      # onecycle | cosine | none
  num_workers:  8

# ── 손실 함수 ─────────────────────────────────────────────────────────────────
loss:
  type:      focal             # focal | ce
  gamma:     2.0               # Focal Loss gamma (Ablation D1: 0/1/2)
  kl_weight: 0.0               # KL 정규화 가중치 (Ablation D2: 0/0.1/0.2/0.3/0.5)
                               # 0이면 KL 비활성화

# ── 재현성 / 저장 ─────────────────────────────────────────────────────────────
seed:         42
save_dir:     /home/oem/TNA_research/checkpoints/
log_dir:      /home/oem/TNA_research/logs/
experiment:   baseline_gru_t10
